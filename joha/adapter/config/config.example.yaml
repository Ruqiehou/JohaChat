# Joha Adapter 配置文件示例
#
# 使用说明：
# 1. 复制此文件为 config.yaml 至项目根目录
# 2. 填写您的实际配置信息
# 3. 不要提交包含真实密钥的配置文件到版本控制系统
#
# 注意：建议使用 127.0.0.1 代替 localhost，避免 IPv4/IPv6 解析问题

napcat:
  ws_url: ws://127.0.0.1:3002        # NapCat WebSocket 地址（推荐使用 127.0.0.1）
  access_token: ""                     # WebSocket 访问令牌
  bot_uin: ""                          # 机器人 QQ 号
  root: ""                             # 管理员 QQ 号
  webui_uri: http://127.0.0.1:6098     # NapCat WebUI 地址
  webui_token: ""                      # WebUI 访问令牌
  auto_start: false                    # 是否自动启动 NapCat（连接失败时）
  napcat_dir: napcat                   # NapCat 目录路径（相对于项目根目录）

settings:
  debug: true                          # 调试模式

logging:
  level: INFO                          # 日志级别: DEBUG, INFO, WARNING, ERROR
  log_dir: logs                        # 日志输出目录
