# Joha 配置文件示例
# 
# 使用说明：
# 1. 复制此文件为 config.yaml
# 2. 填写您的实际配置信息
# 3. 不要提交包含真实密钥的配置文件到版本控制系统

root: 'YOUR_ROOT_QQ_NUMBER'
bt_uin: 'YOUR_BOT_UIN'
enable_webui_interaction: true
debug: true
github_proxy: null
check_ncatbot_update: true
skip_ncatbot_install_check: false
websocket_timeout: 15

napcat:
  ws_uri: ws://localhost:3002
  ws_token: YOUR_WS_TOKEN
  ws_listen_ip: localhost
  webui_uri: http://localhost:6098
  webui_token: YOUR_WEBUI_TOKEN
  enable_webui: true
  check_napcat_update: false
  stop_napcat: false
  remote_mode: false
  report_self_message: false
  report_forward_message_detail: true

plugin:
  plugins_dir: plugins
  plugin_whitelist: []
  plugin_blacklist: []
  skip_plugin_load: false
